# =============================================================================
# small-messanger edge routes for the shared Hormiga host nginx vhost
# (hormi.isolutions.io). These are OWNED by this repo, NOT by hormiga-deploy.
#
# They run LIVE on 91.99.6.25 inside /etc/nginx/conf.d/hormi.isolutions.io.conf
# but are ABSENT from the hormiga-deploy repo (04-edge/nginx/hormi.isolutions.io.conf)
# — i.e. undocumented drift. This file is the source of truth; install it as an
# include inside the hormi.isolutions.io `server { listen 443 ... }` block:
#
#   include /etc/nginx/snippets/messenger-edge.conf;   # place BEFORE `location /`
#
# then: sudo nginx -t && sudo systemctl reload nginx
#
# Both locations must sit BEFORE the catch-all `location /` (which proxies to
# Oathkeeper). The `/messenger/**` REST+WS app traffic is NOT here — it flows
# through `location /` -> Oathkeeper (shared infra), unchanged.
#
# Depends on the host-level snippet /etc/nginx/snippets/strip-identity-headers.conf
# (provided by hormiga-deploy) which blanks client-supplied X-User-* headers.
#
# NOTE (scope): the `/api` and `/_next/static` routes seen on this host belong to
# a DIFFERENT app (Dental Zone, Next.js on 127.0.0.1:8181, vhost
# hormi-day.isolutions.io) — they are NOT part of small-messanger and are
# intentionally excluded here. small-messanger is a Vite SPA (assets under
# /assets/), served only at /messenger-ui/.
# =============================================================================

# Messenger test UI — front4mess static SPA (systemd unit, 127.0.0.1:5555).
# Mounted at the /messenger-ui/ subpath (Vite base-prefixes the assets). The app
# itself calls /messenger/** (via Oathkeeper) and /.ory/kratos/public/** on this
# same origin so the Kratos session cookie applies.
location /messenger-ui/ {
    include /etc/nginx/snippets/strip-identity-headers.conf;
    proxy_pass http://127.0.0.1:5555/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    # WebRTC needs camera+mic. Override the domain-wide
    # `Permissions-Policy: camera=(), microphone=()` for this document only.
    # A location-level add_header disables inheritance of the server-level
    # security headers, so ALL of them are re-declared here to keep this path
    # equally hardened.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Cross-Origin-Resource-Policy same-origin always;
    add_header Content-Security-Policy "frame-ancestors 'self'" always;
    add_header Permissions-Policy "geolocation=(), camera=(self), microphone=(self)" always;
}

# MinIO presigned attachment I/O. Presigned URLs sign host=hormi.isolutions.io +
# path=/<bucket>/<key>; proxy the bucket path straight to MinIO preserving Host so
# the SigV4 signature matches. Streamed (no buffering) for large uploads/downloads.
# NOTE: NO trailing slash — bucket-root ops (?location=, make-bucket) sign the path
# WITHOUT a slash and must match exactly, else SigV4 SignatureDoesNotMatch.
location /messenger-attachments {
    proxy_pass http://127.0.0.1:9000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_request_buffering off;
    proxy_buffering off;
    client_max_body_size 0;
    proxy_read_timeout 300s;
}
