# =====================
# HTTP → HTTPS redirect
# =====================
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

# =====================
# HTTPS server
# =====================
server {
    listen 443 ssl http2;
    server_name localhost;

    # 🔐 SSL
    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # 📂 Static frontend
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 🚀 REST API
    location /api/ {
        proxy_pass http://node:3000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 🔌 WebSocket (WSS)
    location /ws {
        proxy_pass http://node:3000/ws;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # 🔌 OAuth2 (Kratos)
        location /kratos/ {
        proxy_pass http://kratos:4433/;  # Kratos слушает HTTP
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;  # важно для Kratos, чтобы генерировал корректные URL

        proxy_set_header Cookie $http_cookie;
        proxy_redirect off;   # отключаем автоматический редирект nginx
  }
}
